<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Open Graph -->
<meta property="og:title" content="💌 Ada yang mau bilang sesuatu ke Naufal?" />
<meta property="og:description" content="Kirim pesan anonim ke Naufal — dia gak bakal tau siapa kamu 👀 Berani coba?" />
<meta property="og:image" content="https://gt.tc/ft.jpg" />

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:#7EC8E3;
  --blue-mid:#4BAFD4;
  --blue-dark:#1A7FA8;
  --white:#F0FAFF;
  --soft:#D6F1FB;
  --accent:#FFE066;
  --text:#0D3A50;
  --muted:#5A8FA3;
}

body {
  min-height: 100vh;
  font-family: 'Sora', sans-serif;
  background: var(--white);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
}

.card {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(18px);
  border-radius: 28px;
  padding: 40px 32px;
  max-width: 400px;
  width: 100%;
  text-align: center;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
}

.icon-wrap {
  font-size: 40px;
  margin-bottom: 16px;
}

h1 {
  font-size: 24px;
  margin-bottom: 10px;
}

.desc {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
}

.badges {
  display: flex;
  gap: 6px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 24px;
}

.badge {
  background: var(--soft);
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
}

.btn {
  display: inline-block;
  padding: 14px 30px;
  border-radius: 999px;
  background: linear-gradient(135deg, var(--blue-mid), var(--blue-dark));
  color: white;
  text-decoration: none;
  font-weight: bold;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="card">
  <div class="icon-wrap">💌</div>
  <h1>Ada yang mau bilang sesuatu ke <span style="color:#1A7FA8;">Naufal</span>?</h1>
  
  <p class="desc">
    Curhat bebas tanpa ketahuan siapa kamu 👀  
    100% anonim dan aman 🔒
  </p>

  <div class="badges">
    <div class="badge">🔒 anonim</div>
    <div class="badge">🚫 no tracking</div>
    <div class="badge">👀 bebas jujur</div>
  </div>

  <!-- 🔥 INI YANG UDAH DIPERBAIKI -->
  <a class="btn" href="https://menfess.gt.tc" target="_self">
    ayo mulai →
  </a>

</div>

</body>
